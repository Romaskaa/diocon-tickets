  #   depends_on:
  #     - minio

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      SECRET_KEY: ${SECRET_KEY}
      FRONTEND_URL: ${FRONTEND_URL}
      # --- Postgres ---
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      # --- MinIO ---
      MINIO_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY_ID}
      MINIO_SECRET_ACCESS_KEY: ${MINIO_SECRET_ACCESS_KEY}
      # --- Redis ---
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      # --- Admin ---
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      # --- Yandex Cloud ---
      YANDEX_CLOUD_FOLDER_ID: ${YANDEX_CLOUD_FOLDER_ID}
      YANDEX_CLOUD_API_KEY: ${YANDEX_CLOUD_API_KEY}
      YANDEX_CLOUD_ACCESS_KEY_ID: ${YANDEX_CLOUD_ACCESS_KEY_ID}
      YANDEX_CLOUD_SECRET_ACCESS_KEY: ${YANDEX_CLOUD_SECRET_ACCESS_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      maildev:
        condition: service_healthy
      minio:
        condition: service_healthy

  # frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #     args:
  #     - VITE_API_URL=${VITE_API_URL}
  #   container_name: diocon-tickets-frontend
  #   ports:
  #     - "3001:80"
  #   restart: unless-stopped
    
  #   networks:
  #     - default

  backup:
    image: alpine:3.20
    container_name: backup
    restart: unless-stopped
    volumes:
      - ./backups:/backups
      - ./scripts/backup_script.sh:/app/backup.sh:ro
      - ./.env:/app/.env:ro
      - ./.docker/minio-data:/minio_data:ro
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - MINIO_ACCESS_KEY_ID=${MINIO_ACCESS_KEY_ID}
      - MINIO_SECRET_ACCESS_KEY=${MINIO_SECRET_ACCESS_KEY}
      # Yandex Cloud credentials (можно взять из .env)
      - YANDEX_S3_BUCKET=backups
      - YANDEX_S3_ENDPOINT=https://storage.yandexcloud.net
    command: |
      /bin/sh -c "
      apk add --no-cache postgresql-client curl openssl
      echo '0 2 * * * /app/backup.sh >> /var/log/backup.log 2>&1' | crontab -
      crond -f
      "
  
  # ============================================================================
  # Мониторинг
  # ============================================================================

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'       # хранить метрики 15 дней
      - '--web.enable-lifecycle'                  # возможность перезагрузки конфига без остановки
    ports:
      - "9090:9090"
    networks:
      - default

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "3000:3000"
    networks:
      - default
    depends_on:
      - prometheus

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  hf_cache:
  prometheus_data:
  grafana_data:
